stages:
  data_ingestion:
    cmd: python -m src.cnnClassifier.pipeline.stage_01_data_ingestion
    deps:
      - src/cnnClassifier/pipeline/stage_01_data_ingestion.py
    outs:
      - artifacts/data_ingestion/Chest-CT-Scan-data

  prepare_base_model:
    cmd: python -m src.cnnClassifier.pipeline.stage_02_prepare_base_model
    deps:
      - src/cnnClassifier/pipeline/stage_02_prepare_base_model.py
    outs:
      - artifacts/prepare_base_model/base_model.keras
      - artifacts/prepare_base_model/base_model_updated.keras

  model_trainer:
    cmd: python -m src.cnnClassifier.pipeline.stage_03_model_trainer
    deps:
      - src/cnnClassifier/pipeline/stage_03_model_trainer.py
      - artifacts/data_ingestion/Chest-CT-Scan-data
      - artifacts/prepare_base_model/base_model_updated.keras
    outs:
      - artifacts/training/model.keras

  model_evaluation:
    cmd: python -m src.cnnClassifier.pipeline.stage_04_model_evaluation
    deps:
      - src/cnnClassifier/pipeline/stage_04_model_evaluation.py
      - artifacts/training/model.keras
      - artifacts/data_ingestion/Chest-CT-Scan-data
    metrics:
      - scores.json:
          cache: false
